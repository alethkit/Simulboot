name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # CLAUDE.md's bar: zero clippy warnings across all targets.
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  deny:
    name: cargo-deny (advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The dependency gate. `advisories` is what would have caught bincode
      # (RUSTSEC-2025-0141). `licenses` is intentionally not checked yet — see
      # deny.toml / SKELETONS.md.
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources
